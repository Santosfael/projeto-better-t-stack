name: api-proffy

services:
  postgres:
    image: postgres:17
    container_name: api-proffy-postgres
    environment:
      POSTGRES_DB: api-proffy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
